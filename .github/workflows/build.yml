name: Build

# Validation gate for pull requests. Lints, then builds the graph on native
# runners (amd64 + arm64, no QEMU), loads each arch's images and smoke-tests
# them, and scans with Trivy. Nothing is pushed. Reads the GHCR build cache so
# unchanged layers are not rebuilt; never writes it (only publish.yml does).
#
# Runs on pull requests only (plus manual dispatch); a plain branch push without
# a PR does not run it, which avoids duplicate runs when a PR is open.

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Hadolint
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo hadolint/hadolint:latest \
            hadolint \
              Dockerfiles/Ubuntu/Dockerfile Dockerfiles/Ubuntu/*/Dockerfile \
              Dockerfiles/Alpine/Dockerfile Dockerfiles/Alpine/*/Dockerfile

  build:
    name: Build and test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read          # read the GHCR build cache
      security-events: write  # upload Trivy SARIF (amd64 leg only)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            targets: default
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            targets: multiarch   # all arches, steamcmd (amd64 only) excluded
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      # Read-only access to the GHCR build cache. continue-on-error so PRs from
      # forks (no package access) still build, just without cache hits.
      - name: Log in to GHCR (cache read)
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.arch }} and load
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          targets: ${{ matrix.targets }}
          load: true
          set: |
            *.platform=${{ matrix.platform }}
        env:
          # lowercase literal: GHCR refs must be lowercase and step env can't transform
          CACHE_REPO: ghcr.io/didstopia/base-buildcache
          CACHE_SUFFIX: -${{ matrix.arch }}

      - name: Smoke test
        run: ./Scripts/test/smoke.sh

      - name: Scan Ubuntu base (Trivy)
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: didstopia/base:ubuntu-24.04
          format: sarif
          output: trivy-ubuntu.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan Alpine base (Trivy)
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: didstopia/base:alpine-3.23
          format: sarif
          output: trivy-alpine.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Ubuntu scan
        if: matrix.arch == 'amd64'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-ubuntu.sarif
          category: trivy-ubuntu

      - name: Upload Alpine scan
        if: matrix.arch == 'amd64'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-alpine.sarif
          category: trivy-alpine
