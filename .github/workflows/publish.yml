name: Publish

# Builds the multi-arch graph on NATIVE runners and pushes to Docker Hub + GHCR.
#
# Why native runners: building arm64 under QEMU emulation on an amd64 runner is
# slow and intermittently segfaults (qemu/ldconfig on glibc). GitHub now offers
# free native arm64 runners for public repos, so each architecture builds on its
# own runner with no emulation, then the per-arch images are merged into one
# multi-arch manifest. steamcmd is amd64 only (no arm64 SteamCMD binary).
#
# Triggers:
#   - push to master    build and push everything
#   - daily schedule     rebuild only the OS lines whose upstream base digest changed
#   - weekly schedule    unconditional full rebuild backstop (apt/apk updates)
#   - manual dispatch    rebuild everything
#
# Build-layer cache lives in a GHCR cache repo, written here and read by PR
# builds, so unchanged layers are not rebuilt. Each base records the upstream
# base digest it built from in org.opencontainers.image.base.digest, which the
# detect job reads back to gate the daily rebuild.

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 3 * * *"    # daily: digest-gated rebuild
    - cron: "0 4 * * 1"    # weekly (Mon): unconditional backstop
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: didstopia/base

jobs:
  detect:
    name: Detect changed base lines
    runs-on: ubuntu-latest
    outputs:
      ubuntu_versions: ${{ steps.decide.outputs.ubuntu_versions }}
      alpine_versions: ${{ steps.decide.outputs.alpine_versions }}
      any: ${{ steps.decide.outputs.any }}
    steps:
      - id: decide
        run: |
          set -euo pipefail
          FULL_UBUNTU='["22.04","24.04"]'
          FULL_ALPINE='["3.22","3.23","edge"]'

          full=false
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            full=true
          elif [ "${{ github.event.schedule }}" = "0 4 * * 1" ]; then
            full=true   # weekly backstop
          fi

          # Print a JSON array of versions whose upstream base digest differs
          # from what our published base image was last built against.
          changed() {
            local up_repo="$1" our_prefix="$2"; shift 2
            local out=()
            for v in "$@"; do
              local up ours
              up=$(docker buildx imagetools inspect "${up_repo}:${v}" --format '{{.Manifest.Digest}}' 2>/dev/null || echo "")
              ours=$(docker buildx imagetools inspect "${REGISTRY}:${our_prefix}-${v}" --format '{{json .Image}}' 2>/dev/null \
                | jq -r 'to_entries[0].value | ((.config // .Config).Labels // {})["org.opencontainers.image.base.digest"] // ""' 2>/dev/null || echo "")
              if [ -z "$up" ] || [ "$up" != "$ours" ]; then out+=("$v"); fi
            done
            if [ "${#out[@]}" -eq 0 ]; then echo "[]"; else printf '%s\n' "${out[@]}" | jq -R . | jq -cs .; fi
          }

          if [ "$full" = "true" ]; then
            ubuntu="$FULL_UBUNTU"; alpine="$FULL_ALPINE"
          else
            ubuntu=$(changed ubuntu ubuntu 22.04 24.04)
            alpine=$(changed alpine alpine 3.22 3.23 edge)
          fi

          any=false
          if [ "$ubuntu" != "[]" ] || [ "$alpine" != "[]" ]; then any=true; fi

          {
            echo "ubuntu_versions=$ubuntu"
            echo "alpine_versions=$alpine"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"
          echo "ubuntu=$ubuntu  alpine=$alpine  any=$any"

  build:
    name: Build ${{ matrix.arch }}
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write   # write build cache to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4   # docker-container driver, no QEMU

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DIDSTOPIA_DOCKERHUB_USERNAME }}
          password: ${{ secrets.DIDSTOPIA_DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.arch }} and push by digest
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          UBUNTU_LIST: ${{ needs.detect.outputs.ubuntu_versions }}
          ALPINE_LIST: ${{ needs.detect.outputs.alpine_versions }}
        run: |
          set -euo pipefail
          export REGISTRY=didstopia/base
          export GHCR_REGISTRY=""   # tags are cleared for push-by-digest; GHCR tags are made in the merge job
          GHCR_OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          export CACHE_REPO="ghcr.io/${GHCR_OWNER}/base-buildcache"
          export CACHE_WRITE=true
          export CACHE_SUFFIX="-${ARCH}"
          export VCS_REF='${{ github.sha }}'
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; export BUILD_DATE
          VERSION="$(git rev-parse --short HEAD)"; export VERSION

          # push images by digest (no tags) to Docker Hub; merge job assembles tags
          OUT='type=image,"name='"${REGISTRY}"'",push-by-digest=true,name-canonical=true,push=true'

          build_os() {
            local group="$1" prefix="$2" up_repo="$3" versions="$4" var="$5" out="$6"
            [ "$versions" = "[]" ] && { echo "no ${prefix} changes"; return 0; }
            local sets=( --set "*.platform=${PLATFORM}" --set "*.tags=" --set "*.output=${OUT}" )
            local v d
            for v in $(echo "$versions" | jq -r '.[]'); do
              d=$(docker buildx imagetools inspect "${up_repo}:${v}" --format '{{.Manifest.Digest}}')
              sets+=( --set "${prefix}-${v//./-}.labels.org.opencontainers.image.base.digest=${d}" )
            done
            local csv; csv=$(echo "$versions" | jq -r 'join(",")')
            echo "Building ${group} (${PLATFORM}) for ${csv}"
            env "${var}=${csv}" docker buildx bake "$group" --metadata-file "$out" "${sets[@]}"
          }

          # amd64 builds the full Ubuntu group (incl. steamcmd); arm64 skips steamcmd
          if [ "$ARCH" = "arm64" ]; then UB_GROUP=ubuntu-multiarch; else UB_GROUP=ubuntu; fi

          echo '{}' > meta-ubuntu.json
          echo '{}' > meta-alpine.json
          build_os "$UB_GROUP" ubuntu ubuntu "$UBUNTU_LIST" UBUNTU_VERSIONS meta-ubuntu.json
          build_os alpine     alpine alpine "$ALPINE_LIST" ALPINE_VERSIONS meta-alpine.json

          jq -s 'add' meta-ubuntu.json meta-alpine.json > "digests-${ARCH}.json"
          echo "=== digests-${ARCH}.json ==="; cat "digests-${ARCH}.json"

      - name: Upload digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: digests-${{ matrix.arch }}.json
          retention-days: 1
          if-no-files-found: error

  merge:
    name: Merge manifests and tag
    needs: [detect, build]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # mirror tags to GHCR
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DIDSTOPIA_DOCKERHUB_USERNAME }}
          password: ${{ secrets.DIDSTOPIA_DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          merge-multiple: true
          path: digests

      - name: Assemble multi-arch manifests
        run: |
          set -euo pipefail
          export REGISTRY=didstopia/base
          GHCR_OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_REGISTRY="ghcr.io/${GHCR_OWNER}/base"; export GHCR_REGISTRY
          # Full target list with final tags (Docker Hub + GHCR). The merge script
          # only touches targets that actually produced a digest this run.
          docker buildx bake --print > bake-print.json
          python3 Scripts/ci/merge-manifests.py bake-print.json digests/digests-amd64.json digests/digests-arm64.json

  scan:
    name: Scan published images
    needs: [detect, merge]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu-24.04
          - alpine-3.23
          - nodejs-24-ubuntu-24.04
    steps:
      - name: Trivy scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: didstopia/base:${{ matrix.image }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"   # report, do not block publishing

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ matrix.image }}
