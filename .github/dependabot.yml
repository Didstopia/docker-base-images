version: 2

updates:
  # GitHub Actions in the workflows. "/" covers everything under
  # .github/workflows (build, publish, downstream, dependabot-auto-merge).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # The composite action lives in a subdirectory, which the "/" entry above does
  # not reliably scan. It has no action dependencies today, but this keeps it
  # covered if that changes.
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/base-image-changed"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Dockerfiles, base images and every variant (the globs cover both levels).
  # FROM lines are ARG-driven, so Dependabot may not always resolve them; OS and
  # package currency is handled by the nightly rebuild in publish.yml regardless.
  # Our own base image is ignored so the variant Dockerfiles (which build FROM
  # didstopia/base) do not generate self-referential PRs.
  - package-ecosystem: "docker"
    directories:
      - "/Dockerfiles/*"
      - "/Dockerfiles/*/*"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    ignore:
      - dependency-name: "didstopia/base"
